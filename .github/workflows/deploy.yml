name: Deploy dashboard to GitHub Pages

# Publica a pasta web/ (dashboard estático) no GitHub Pages a cada push na main.
# Para atualizar os dados: rode `python -m wc2026.export_web [--live]` localmente,
# commite o web/wc_data.js atualizado e dê push — o deploy roda sozinho.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: web
      - id: deployment
        uses: actions/deploy-pages@v4
