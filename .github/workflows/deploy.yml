name: Deploy dashboard to GitHub Pages

# Publica a pasta web/ (dashboard estático) no GitHub Pages a cada push na main.
# Para atualizar os dados: rode `python -m wc2026.export_web [--live]` localmente,
# commite o web/wc_data.js atualizado e dê push — o deploy roda sozinho.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url || steps.deployment_retry.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: web
      # 1ª tentativa: o backend do Pages às vezes rejeita na hora ("Deployment
      # failed, try again later.") — um erro transitório do GitHub, não do build.
      # continue-on-error deixa a 2ª tentativa acontecer em vez de já falhar o run.
      - id: deployment
        continue-on-error: true
        uses: actions/deploy-pages@v4
      - name: Esperar antes de repetir o deploy
        if: steps.deployment.outcome == 'failure'
        run: sleep 30
      # 2ª tentativa: só roda se a 1ª falhou. Se ESTA também falhar, o run fica
      # vermelho (aí é problema de verdade, não um soluço transitório).
      - id: deployment_retry
        if: steps.deployment.outcome == 'failure'
        uses: actions/deploy-pages@v4
