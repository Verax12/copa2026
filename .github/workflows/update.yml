name: Atualizar previsões

# Roda o pipeline completo na nuvem e republica o dashboard.
# Disparado de 3 formas:
#   - automático: todo dia às 06:00 UTC (= 03:00 de Brasília)
#   - manual: pela página /atualizar ou pelo botão "Run workflow" do GitHub
# Passos:
#   1) baixa os resultados mais recentes (martj42 + openfootball)
#   2) puxa microestatísticas (TheSportsDB)
#   3) re-roda o modelo (ensemble) e gera web/wc_data.js
#   4) commita os dados e republica o GitHub Pages

on:
  workflow_dispatch:
  schedule:
    # 06:00 UTC = 03:00 Brasília (UTC-3). Cron do GitHub roda sempre em UTC.
    # Obs.: o GitHub pode atrasar alguns minutos em horários de pico.
    - cron: "0 6 * * *"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Instalar dependências
        run: pip install -r requirements.txt

      - name: Sincronizar branch antes de gerar artefatos
        run: git pull --rebase origin main

      - name: Atualizar base de jogos
        run: python -m wc2026.data --update

      - name: Buscar microestatísticas (fonte gratuita)
        run: python -m wc2026.thesportsdb --pull || echo "sem stats novas, seguindo"

      - name: Re-rodar previsões (ensemble; micro-stats só p/ exibição, não p/ predição)
        run: scripts/generate_web_data.sh

      - name: Commitar dados atualizados
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # o grosso do api_cache é gitignored (regenerável). Exceção: o cache do
          # TheSportsDB (api_cache/tsdb_*.json, liberado no .gitignore) é persistido
          # para ACUMULAR cobertura de estatísticas (a fonte grátis é rate-limitada
          # e não reingere jogos antigos). `git add api_cache/` adiciona só os
          # tsdb_* liberados e ignora o resto, sem falhar sob `bash -e`.
          git add results.csv goalscorers.csv shootouts.csv web/wc_data.js api_cache/
          if git diff --cached --quiet; then
            echo "Nenhuma mudança nos dados."
          else
            git commit -m "dados: atualização automática via /atualizar [skip ci]"
            for i in 1 2 3; do
              git push && exit 0
              echo "Push recusado; sincronizando e tentando novamente ($i/3)."
              git pull --rebase origin main
            done
            echo "Falha ao publicar dados atualizados após 3 tentativas."
            exit 1
          fi

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: web
      - id: deployment
        uses: actions/deploy-pages@v4
